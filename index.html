<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 QRShare</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <header>
    <div class="logo">📡</div>
    <div class="header-text"><h1>Local Network Share</h1><p>{server_address}</p></div>
    <div class="badge"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent2);display:inline-block;box-shadow:0 0 8px var(--accent2);"></span>Live</div>
  </header>
  <div class="breadcrumb">{breadcrumb_html}</div>
  <div class="file-list">
    <div class="file-list-header"><span>Name</span><span style="text-align:right">Size</span><span></span></div>
    {file_rows}
  </div>
  <footer><p>Served via <code>QR File Sharer</code> · High-speed LAN Transfer</p></footer>
</div>
</body>
</html>
